<!DOCTYPE html>
<html>
<head>
    <title>ResiPortal | Home</title>

    <style>
        :root {
            --brand:#0B2340;
            --brand-dark:#081a33;
            --bg:#f5f1e8;
        }

        html, body {
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            height:100%;
            overflow:hidden;
            animation: fadeBody 1s ease-in;
        }

        body {
            background:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.45)),
                url('images/image2')
                no-repeat center center/cover;
        }

        @keyframes fadeBody {
            from { opacity:0; }
            to { opacity:1; }
        }

        /* HERO */
        .hero {
            text-align:center;
            color:white;
            padding-top:60px;
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        .hero h1 {
            margin:0;
            font-size:46px;
            text-shadow:0 4px 18px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size:18px;
            margin-top:8px;
            color:#e7e7e7;
        }

        /* 🔥 PORTAL SELECTION */
        .selection-wrapper{
            height:calc(100vh - 200px);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .selection-area{
            display:flex;
            gap:60px;
        }

        .portal-card{
            width:320px;
            height:360px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(14px);
            border-radius:20px;
            text-align:center;
            padding:30px 24px;
            color:white;
            border:1px solid rgba(255,255,255,0.3);
            box-shadow:0 10px 35px rgba(0,0,0,0.45);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            transition:0.35s;
        }

        .portal-card:hover{
            transform:translateY(-12px) scale(1.05);
            box-shadow:0 18px 55px rgba(0,0,0,0.6);
        }

        .portal-icon{
            font-size:78px;
            margin-bottom:18px;
            text-shadow:0 4px 20px rgba(0,0,0,0.7);
        }

        .portal-card h2{
            margin:6px 0 10px;
            font-size:26px;
        }

        .portal-card p{
            font-size:15px;
            color:#f0f0f0;
            line-height:1.5;
            margin-bottom:24px;
        }

        .portal-card button{
            padding:14px 36px;
            border:none;
            background:var(--brand);
            color:white;
            font-size:16px;
            border-radius:30px;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 6px 22px rgba(0,0,0,0.45);
        }

        .portal-card button:hover{
            background:var(--brand-dark);
            transform:scale(1.12);
        }

        /* FOOTER (UNCHANGED) */
        footer {
            background:rgba(0,0,0,0.45);
            color:white;
            padding:12px;
            text-align:center;
            font-size:14px;
            width:100%;
            position:fixed;
            bottom:0;
            backdrop-filter:blur(6px);
        }

        /* Mobile */
        @media(max-width:800px){
            body{ overflow-y:auto; }
            .selection-wrapper{ height:auto; margin-top:40px; }
            .selection-area{ flex-direction:column; gap:30px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>ResiPortal</h1>
    <p class="subtitle">- Enhance Your Experience With Us -</p>
</div>

<div class="selection-wrapper">
    <div class="selection-area">

        <!-- RESIDENT -->
        <div class="portal-card">
            <div class="portal-icon">🏠</div>
            <h2>Resident Portal</h2>
            <p>
                Pay maintenance, book facilities,
                raise complaints and view notices.
            </p>
            <button onclick="goResident()">Enter as Resident</button>
        </div>

        <!-- ADMIN -->
        <div class="portal-card">
            <div class="portal-icon">🧑🏻‍💻</div>
            <h2>Admin Portal</h2>
            <p>
                Manage residents, payments,
                notices, bookings and complaints.
            </p>
            <button onclick="goAdmin()">Enter as Admin</button>
        </div>

    </div>
</div>

<footer>
    © 2025 ResiPortal | Developed for Educational purpose
</footer>

<script>
function goResident(){ window.location.href = "residents/user_login.html"; }
function goAdmin(){ window.location.href = "admin/Admin_login.html"; }
</script>

</body>
</html>
